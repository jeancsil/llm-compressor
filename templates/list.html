<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session History · LLMLingua</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'SF Mono','Fira Code',monospace; background: #0d1117; color: #c9d1d9; padding: 20px; max-width: 900px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #21262d; }
  .title { color: #58a6ff; font-size: 14px; font-weight: 700; letter-spacing: .04em; }
  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .summary { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px 18px; margin-bottom: 16px; font-size: 12px; color: #8b949e; display: flex; gap: 24px; flex-wrap: wrap; }
  .summary b { color: #c9d1d9; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; color: #8b949e; font-weight: 600; padding: 8px 12px; border-bottom: 1px solid #21262d; letter-spacing: .04em; font-size: 10px; text-transform: uppercase; }
  td { padding: 10px 12px; border-bottom: 1px solid #161b22; vertical-align: middle; }
  tr:hover td { background: #161b22; }
  .badge { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 3px; font-weight: 600; letter-spacing: .03em; }
  .badge-pending { background: #2b2200; color: #d29922; }
  .badge-active  { background: #0d2b1a; color: #3fb950; }
  .badge-closed  { background: #1c2128; color: #484f58; }
  .slug-hint { font-size: 10px; color: #484f58; margin-top: 2px; }
  .empty { text-align: center; color: #484f58; padding: 40px; font-size: 12px; }
  .pager { display: flex; align-items: center; gap: 10px; font-size: 11px; color: #8b949e; padding: 10px 0 2px; }
  .pager-btn { background: #161b22; color: #58a6ff; border: 1px solid #30363d; border-radius: 5px; padding: 3px 10px; cursor: pointer; font-family: inherit; font-size: 11px; }
  .pager-btn:hover:not(:disabled) { border-color: #58a6ff; }
  .pager-btn:disabled { opacity: .35; cursor: default; }
  .pager-info { color: #484f58; }
</style>
</head>
<body>
<div class="header">
  <span class="title">SESSION HISTORY</span>
  <a href="/dashboard" style="font-size:11px;color:#8b949e">← dashboard</a>
</div>
<div class="summary" id="summary">loading…</div>
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Status</th>
      <th>API Saved</th>
      <th>API Req</th>
      <th>RTK Saved</th>
      <th>RTK Cmds</th>
      <th>Total Saved</th>
      <th>Created</th>
      <th>Linked</th>
      <th>Closed</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>
<div id="pager"></div>
<script>
function buildPager(containerId, page, pages, total, onPage) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (pages <= 0) { el.innerHTML = ''; return; }
  const pageSize = Math.ceil(total / pages);
  const start = (page - 1) * pageSize + 1;
  const end = Math.min(page * pageSize, total);
  el.innerHTML =
    '<button class="pager-btn" id="' + containerId + '_prev" ' + (page <= 1 ? 'disabled' : '') + '>← Prev</button>' +
    '<span class="pager-info">Page ' + page + ' of ' + pages + ' &nbsp;·&nbsp; ' + total + ' total</span>' +
    '<button class="pager-btn" id="' + containerId + '_next" ' + (page >= pages ? 'disabled' : '') + '>Next →</button>';
  const prevBtn = document.getElementById(containerId + '_prev');
  const nextBtn = document.getElementById(containerId + '_next');
  if (prevBtn) prevBtn.onclick = () => onPage(page - 1);
  if (nextBtn) nextBtn.onclick = () => onPage(page + 1);
}
function fmt(n) {
  if (!n) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return n.toLocaleString();
}
function fmtDate(s) {
  if (!s) return '—';
  return s.replace('T', ' ').slice(0, 16);
}
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let _trackerPage = 1;
const TRACKER_PAGE_SIZE = 25;
async function load(page) {
  page = page || _trackerPage;
  _trackerPage = page;
  const data = await fetch('/admin/tracker/all?page=' + page + '&page_size=' + TRACKER_PAGE_SIZE).then(r => r.json());
  const items = data.items || [];
  const totalApiSaved = items.reduce((a, t) => a + (t.tokens_saved || 0), 0);
  const totalRtkSaved = items.reduce((a, t) => a + (t.rtk_saved   || 0), 0);
  const linked = items.filter(t => t.session_id);
  document.getElementById('summary').innerHTML =
    '<span><b>' + data.total + '</b> sessions total</span>' +
    '<span><b>' + linked.length + '</b> linked to Claude (this page)</span>' +
    '<span><b>' + fmt(totalApiSaved) + '</b> API tokens saved (this page)</span>' +
    '<span><b>' + fmt(totalRtkSaved) + '</b> RTK tokens saved (this page)</span>' +
    '<span><b>' + fmt(totalApiSaved + totalRtkSaved) + '</b> total saved (this page)</span>';
  const tbody = document.getElementById('rows');
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="10" class="empty">No tracked sessions yet.</td></tr>';
    document.getElementById('pager').innerHTML = '';
    return;
  }
  tbody.innerHTML = items.map(t => {
    const slug  = encodeURIComponent(t.slug);
    const badge = '<span class="badge badge-' + escapeHtml(t.status) + '">' + escapeHtml(t.status) + '</span>';
    const total = (t.tokens_saved || 0) + (t.rtk_saved || 0);
    return '<tr>'
      + '<td><a href="/dashboard/' + slug + '">' + escapeHtml(t.name) + '</a>'
      + '<div class="slug-hint">' + escapeHtml(t.slug) + '</div></td>'
      + '<td>' + badge + '</td>'
      + '<td style="color:#3fb950;font-weight:600">' + fmt(t.tokens_saved) + '</td>'
      + '<td style="color:#8b949e">' + (t.requests || '—') + '</td>'
      + '<td style="color:#58a6ff;font-weight:600">' + fmt(t.rtk_saved) + '</td>'
      + '<td style="color:#8b949e">' + (t.rtk_commands || '—') + '</td>'
      + '<td style="color:#3fb950;font-weight:700">' + fmt(total) + '</td>'
      + '<td style="color:#484f58">' + fmtDate(t.created_at) + '</td>'
      + '<td style="color:#484f58">' + fmtDate(t.linked_at) + '</td>'
      + '<td style="color:#484f58">' + fmtDate(t.closed_at) + '</td>'
      + '</tr>';
  }).join('');
  buildPager('pager', data.page, data.pages, data.total, load);
}
load();
</script>
</body>
</html>
