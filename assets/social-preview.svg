<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <rect width="1280" height="640" fill="#0d1117"/>

  <!-- Logo mark -->
  <g transform="translate(560,80) scale(2)">
    <rect width="80" height="80" rx="16" fill="#0d1117" stroke="#3fb950" stroke-width="2"/>
    <rect x="12" y="10" width="56" height="12" rx="2" fill="#8b949e"/>
    <polygon points="18,34 30,40 18,46" fill="#3fb950"/>
    <polygon points="62,34 50,40 62,46" fill="#3fb950"/>
    <rect x="28" y="58" width="24" height="12" rx="2" fill="#3fb950"/>
  </g>

  <!-- Title -->
  <text x="640" y="335" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="64" font-weight="800" fill="#f0f6fc">
    LLM-Compressor
  </text>

  <!-- Tagline -->
  <text x="640" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="24" fill="#8b949e">
    A local proxy that compresses every Claude Code prompt before it's billed.
  </text>

  <text x="640" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="18" font-weight="600" fill="#3fb950" letter-spacing="0.08em">
    NO WORKFLOW CHANGES · ONE ENV VAR
  </text>

  <!-- Stat chips -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#c9d1d9">
    <rect x="225" y="480" width="230" height="44" rx="22" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="340" y="508" text-anchor="middle">up to 52% savings</text>

    <rect x="475" y="480" width="180" height="44" rx="22" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="565" y="508" text-anchor="middle">live dashboard</text>

    <rect x="675" y="480" width="190" height="44" rx="22" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="770" y="508" text-anchor="middle">4 models</text>

    <rect x="885" y="480" width="170" height="44" rx="22" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="970" y="508" text-anchor="middle">stacks with rtk</text>
  </g>

  <!-- Footer -->
  <text x="640" y="590" text-anchor="middle" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace"
        font-size="16" fill="#8b949e">
    github.com/jeancsil/llm-compressor
  </text>
</svg>
