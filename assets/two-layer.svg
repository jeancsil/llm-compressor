<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="100%">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#484f58"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="340" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e6edf3">Two-Layer Token Compression</text>

  <!-- Claude Code box (y=36, h=56, centre y=64) -->
  <rect x="140" y="36" width="520" height="56" rx="6" fill="#161b22" stroke="#388bfd" stroke-width="1.5"/>
  <text x="400" y="59" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#388bfd">Claude Code</text>
  <text x="400" y="79" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#8b949e">generates CLI commands &amp; API prompts</text>

  <!-- Arrow 1: Claude Code → Shell Layer (92 → 116) -->
  <line x1="400" y1="92" x2="400" y2="114" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Shell Layer box (rtk) (y=118, h=72, centre y=154) -->
  <rect x="140" y="118" width="520" height="72" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="256" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#d29922" letter-spacing="1">SHELL LAYER</text>
  <text x="430" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#d29922">rtk — Rust Token Killer</text>
  <text x="400" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#e6edf3">Filters CLI output before it enters the context window</text>
  <text x="400" y="180" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#8b949e">1,806 commands · 16.9M tokens saved · 29.7% avg</text>

  <!-- Arrow 2: Shell Layer → API Layer (190 → 214) -->
  <line x1="400" y1="190" x2="400" y2="212" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- API Layer box (llm-compressor) (y=216, h=72, centre y=252) -->
  <rect x="140" y="216" width="520" height="72" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="222" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#3fb950" letter-spacing="1">API LAYER</text>
  <text x="390" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#3fb950">llm-compressor</text>
  <text x="630" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">&#x25C4; you are here</text>
  <text x="400" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#e6edf3">Compresses prompts before Anthropic bills them</text>
  <text x="400" y="278" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#8b949e">16,596 compressions · 39.9M tokens saved · 37.1% avg</text>

  <!-- Arrow 3: API Layer → Anthropic (288 → 310) -->
  <line x1="400" y1="288" x2="400" y2="308" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Anthropic API box (y=312, h=20, centre y=322) -->
  <rect x="140" y="312" width="520" height="20" rx="6" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/>
  <text x="400" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Anthropic API</text>
</svg>
