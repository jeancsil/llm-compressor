  </text>

  <!-- Divider 3 -->
  <line x1="600" y1="48" x2="600" y2="164" stroke="#30363d" stroke-width="1"/>

  <!-- Stat block 4: SHELL COMPRESSION -->
  <text x="700" y="82" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="10" fill="#8b949e" letter-spacing="0.08em">
