<svg xmlns="http://www.w3.org/2000/svg" width="800" height="180" viewBox="0 0 800 180">
  <rect width="800" height="180" rx="8" ry="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="32" rx="8" ry="8" fill="#161b22"/>
  <rect x="0" y="16" width="800" height="16" fill="#161b22"/>
  <line x1="0" y1="32" x2="800" y2="32" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="21" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#8b949e" letter-spacing="0.02em">
    LLM-Compressor · real usage data · May–June 2026
  </text>

  <!-- Stat block 1: TOKENS SAVED -->
  <text x="100" y="82" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="10" fill="#8b949e" letter-spacing="0.08em" text-transform="uppercase">
    TOKENS SAVED
  </text>
  <text x="100" y="124" text-anchor="middle"
        font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace"
        font-size="34" font-weight="700" fill="#3fb950">
    56.8M
  </text>
  <text x="100" y="148" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#8b949e">
    across ~5 weeks
  </text>

  <!-- Divider 1 -->
  <line x1="200" y1="48" x2="200" y2="164" stroke="#30363d" stroke-width="1"/>

  <!-- Stat block 2: EST. COST SAVED -->
  <text x="300" y="82" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="10" fill="#8b949e" letter-spacing="0.08em">
    EST. COST SAVED
  </text>
  <text x="300" y="124" text-anchor="middle"
        font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace"
        font-size="34" font-weight="700" fill="#3fb950">
    $171
  </text>
  <text x="300" y="148" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#8b949e">
    at $3 / MTok
  </text>

  <!-- Divider 2 -->
  <line x1="400" y1="48" x2="400" y2="164" stroke="#30363d" stroke-width="1"/>

  <!-- Stat block 3: API COMPRESSION -->
  <text x="500" y="82" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="10" fill="#8b949e" letter-spacing="0.08em">
    API COMPRESSION
  </text>
  <text x="500" y="124" text-anchor="middle"
        font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace"
        font-size="34" font-weight="700" fill="#3fb950">
