  <text x="50" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#8b949e" text-anchor="end">4M</text>

  <!--
    Chart area width: 788-56 = 732px
    24 bars, bar width + gap
    bar width = 18, gap = 732/24 - 18 = 30.5 - 18 = 12.5 → slot = 30.5, bar=18, pad=6.25 each side
    slot = 732/24 = 30.5
    bar center at 56 + (i+0.5)*30.5
    bar left at center - 9

    Scale: 4.5M = 133px (from y=77 to y=210)
    px per token = 133/4500000

    Data: tokens → bar height
    1294662 → 38.3
    1485045 → 43.9
    2891772 → 85.4
    718815  → 21.2
    4173266 → 123.3
    2197659 → 64.9
    1868551 → 55.2
    176945  → 5.2
    570490  → 16.9
    954096  → 28.2
    3320737 → 98.1
    1844279 → 54.5
    2543390 → 75.1
    2291090 → 67.7
    1323903 → 39.1
    2746339 → 81.1
    1418031 → 41.9
    2534095 → 74.9
    126512  → 3.7
    550635  → 16.3
    1739836 → 51.4
    340860  → 10.1
    834424  → 24.7
    1884672 → 55.7
  -->

