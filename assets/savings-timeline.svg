  <!-- Chart area: x=56 to x=788, y=60 to y=210 -->
  <!-- Y gridlines at 0, 1M, 2M, 3M, 4M -->

  <line x1="56" y1="210" x2="788" y2="210" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="213" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#8b949e" text-anchor="end">0</text>

  <line x1="56" y1="177" x2="788" y2="177" stroke="#30363d" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="50" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#8b949e" text-anchor="end">1M</text>

  <line x1="56" y1="143" x2="788" y2="143" stroke="#30363d" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="50" y="146" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#8b949e" text-anchor="end">2M</text>

  <line x1="56" y1="110" x2="788" y2="110" stroke="#30363d" stroke-width="0.5" stroke-dasharray="3,3"/>
