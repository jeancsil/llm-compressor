<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Background -->
  <rect width="80" height="80" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Funnel: wide top trapezoid -->
  <polygon points="14,18 66,18 52,46 28,46" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Token lines inside funnel (muted grey, decreasing width) -->
  <line x1="22" y1="26" x2="58" y2="26" stroke="#8b949e" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="26" y1="33" x2="54" y2="33" stroke="#8b949e" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="30" y1="40" x2="50" y2="40" stroke="#8b949e" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Narrow pipe below funnel -->
  <rect x="35" y="46" width="10" height="16" rx="2" fill="none" stroke="#3fb950" stroke-width="1.5"/>

  <!-- Compressed output line (green) -->
  <line x1="40" y1="54" x2="40" y2="54" stroke="#3fb950" stroke-width="3" stroke-linecap="round"/>
  <line x1="33" y1="57" x2="47" y2="57" stroke="#3fb950" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Small </> symbol in green inside funnel -->
  <text x="40" y="38" font-family="monospace" font-size="7" font-weight="700" fill="#3fb950" text-anchor="middle" opacity="0.0"/>

  <!-- Downward arrow tip at pipe exit -->
  <polygon points="36,62 44,62 40,68" fill="#3fb950"/>
</svg>
